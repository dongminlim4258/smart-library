<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트도서관 네비게이터</title>
    <link rel="stylesheet" href="style_dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=35b5b863774f0cef13d397c765007386"></script>
</head>
<body>

    <div class="center-wrapper">
        <div id="main-dashboard-page">
            <header class="main-hero">
                <h2>스마트도서관에서 책을 찾고계신가요?</h2>
            </header>

            <section class="search-section">
                <div class="search-bar-container">
                    <input type="text" id="book-search" placeholder="원하는 도서명이나 저자를 입력하세요...">
                    <button type="button" id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </section>

            <main class="dashboard-grid">
                <div class="card menu-card" id="go-to-map-btn">
                    <div class="card-icon"><i class="fa-solid fa-map-location-dot"></i></div>
                    <h3>도서관 지도</h3>
                </div>
                <div class="card menu-card" onclick="alert('준비 중인 기능입니다.')">
                    <div class="card-icon"><i class="fa-solid fa-route"></i></div>
                    <h3>길찾기</h3>
                </div>
                <div class="card menu-card" onclick="alert('준비 중인 기능입니다.')">
                    <div class="card-icon"><i class="fa-solid fa-book-open-reader"></i></div>
                    <h3>사용방법</h3>
                </div>
                <div class="card menu-card" onclick="alert('준비 중인 기능입니다.')">
                    <div class="card-icon"><i class="fa-solid fa-fire"></i></div>
                    <h3>인기도서</h3>
                </div>
                <div class="card empty-card"></div>
                <div class="card empty-card"></div>
                <div class="card empty-card"></div>
                <div class="card empty-card"></div>
            </main>
        </div>

        <div id="search-results-page" style="display: none;">
            <header class="results-page-header">
                <button type="button" class="back-btn"><i class="fa-solid fa-arrow-left"></i> 뒤로가기</button>
                <h2>검색 결과 (<span id="result-count">0</span>)</h2>
            </header>
            <main id="results-list" class="results-page-content"></main>
        </div>

        <div id="map-page" style="display: none;">
            <header class="results-page-header">
                <button type="button" class="back-btn"><i class="fa-solid fa-arrow-left"></i> 뒤로가기</button>
                <h2>스마트도서관 위치 지도</h2>
            </header>
            <div id="library-map-container" style="width:100%; height:450px; border-radius:20px; border:1px solid #eee;"></div>
            <p style="margin-top:15px; font-size:0.85rem; color:#666;">📍 마커를 클릭하면 상세 위치를 확인할 수 있습니다.</p>
        </div>
    </div>

    <script src="data_bg.js"></script>
    <script src="data_sc.js"></script>
    <script src="data_yc.js"></script>
    <script src="data_ys.js"></script>
    <script src="data_hj.js"></script>
    
    <script src="main.js"></script>
</body>
</html>
